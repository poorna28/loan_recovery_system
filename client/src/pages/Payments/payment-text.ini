5. Real-World Example
Customer borrows $10,000 at 12% annual interest

Month	Starting Balance	Monthly Interest	Payment	To Interest	To Principal	Ending Balance
1	$10,000	$100	$500	$100	$400	$9,600
2	$9,600	$96	$500	$96	$404	$9,196
3	$9,196	$92	$500	$92	$408	$8,788
...	...	...	$500	...	...	...
24	$156	$1.30	$150	$1.30	$148.70	$7.30
25	$7.30	$0.07	$10	$0.07	$9.93	$0 ✅ PAID OFF
6. Key Rules
✅ Only ACTIVE loans can receive payments
✅ Interest calculated monthly (1/12 of annual rate)
✅ Payment allocated = Interest first, remainder to principal
✅ If underpayment = Balance grows (unpaid interest added)
✅ Payment capped to remaining balance (can't overpay)
✅ Next due date automatically set to 1 month ahead

This system ensures customers pay interest first and can't pay off a loan unfairly!