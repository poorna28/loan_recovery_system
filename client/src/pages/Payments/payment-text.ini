'll explain how loans and payments are linked, how interest is calculated, and how the data flows through the system.

1. Database Schema - Link Between Loans & Payments
Loan Table (loan_customer)

id (Primary Key)
loan_id
customer_id
loan_amount
interest_rate (annual %)
loan_term (months)
status_approved (PENDING, APPROVED, REJECTED, ACTIVE)
remaining_balance (amount still owed)
next_payment_due (date)
monthly_payment

Payment Table (loan_payments)
id (Primary Key)
loan_customer_id ← LINKS TO loan_customer.id
loan_id (for reference)
amount_paid
payment_date
payment_method
principal_component (paid towards principal)
interest_component (paid towards interest)
remaining_balance (what's left after payment)

The Link: loan_payments.loan_customer_id → loan_customer.id
2. Interest Calculation Process
Step 1: Monthly Interest Calculation
📄 paymentEngine.js

const calculateInterest = (balance, annualRate) => {
  const monthlyRate = annualRate / 12 / 100;
  return balance * monthlyRate;
};

Example:

Remaining Balance: $10,000
Annual Interest Rate: 12%
Monthly Rate: 12 ÷ 12 ÷ 100 = 0.01 (1%)
Monthly Interest = $10,000 × 0.01 = $100
Step 2: Payment Allocation
📄 paymentEngine.js

When user makes a payment, the processPayment() function allocates it:

const processPayment = ({ balance, annualRate, paymentAmount }) => {
  const interest = calculateInterest(balance, annualRate);

  // ❌ Case 1: Payment doesn't cover interest
  if (paymentAmount <= interest) {
    const unpaidInterest = interest - paymentAmount;
    return {
      interestComponent: paymentAmount,        // All goes to interest
      principalComponent: 0,                   // Nothing towards loan
      remainingBalance: balance + unpaidInterest  // Balance grows!
    };
  }

  // ✅ Case 2: Normal payment (covers interest + some principal)
  const principal = paymentAmount - interest;
  const safePrincipal = principal > balance ? balance : principal;
  const newBalance = balance - safePrincipal;

  return {
    interestComponent: interest,      // Interest portion
    principalComponent: safePrincipal, // Principal reduction
    remainingBalance: newBalance      // Updated balance
  };
};

Scenarios:

Scenario	Balance	Rate	Payment	Interest	Goes to Interest	Goes to Principal	New Balance
Underpay	$10,000	12%	$50	$100	$50	$0	$10,050 🔴 (grows)
Exact	$10,000	12%	$100	$100	$100	$0	$10,000 (stays)
Normal	$10,000	12%	$500	$100	$100	$400	$9,600 ✅
Overpay	$1,000	12%	$2,000	$10	$10	$990	$0 ✅ (paid off)
3. Data Flow: From Payment to Storage
Frontend → Backend 📤
User fills form & clicks "Process Payment" (payment_form.js)

api.post('/payments/make', {
  loanId: 5,           // Which loan (loan_customer.id)
  amount: 500,         // Payment amount
  method: 'CASH'       // How paid
});

Backend Processing 📦
paymentController.js

exports.makePayment = async (req, res) => {
  try {
    const { loanId, amount, method } = req.body;
    
    // Convert to numbers
    const numericLoanId = Number(loanId);
    const numericAmount = Number(amount);
    
    // Validate
    if (isNaN(numericLoanId) || isNaN(numericAmount) || numericAmount <= 0) {
      return res.status(400).json({ message: 'Invalid input' });
    }
    
    // Call payment model
    const result = await paymentModel.makePayment(
      numericLoanId,
      numericAmount,
      method
    );
    
    res.status(200).json({
      message: 'Payment successful',
      payment: result
    });
  } catch (err) {
    res.status(500).json({ message: err.message });
  }
};

Payment Processing 🔧
paymentModel.js

Step 1: Get Loan Details

db.query(
  `SELECT id, loan_id, interest_rate, remaining_balance, status_approved
   FROM loan_customer WHERE id = ?`,
  [loanId],
  (err, results) => {
    const loan = results[0];
    
    // Check if loan is ACTIVE
    if (loan.status_approved !== 'ACTIVE') {
      return reject(new Error('Payments allowed only for ACTIVE loans'));
    }

Step 2: Calculate Payment Allocation

    const balance = Number(loan.remaining_balance);
    const cappedPayment = paymentAmount > balance ? balance : paymentAmount;
    
    const allocation = processPayment({
      balance,
      annualRate: loan.interest_rate,
      paymentAmount: cappedPayment
    });
    // allocation = {
    //   interestComponent: 100,
    //   principalComponent: 400,
    //   remainingBalance: 9600
    // }
Step 3: Save Payment Record

db.query(
  `INSERT INTO loan_payments
   (loan_customer_id, loan_id, amount_paid, payment_date,
    payment_method, principal_component, interest_component, 
    remaining_balance)
   VALUES (?, ?, ?, CURDATE(), ?, ?, ?, ?)`,
  [
    loanId,
    loan.loan_id,
    cappedPayment,
    method,
    allocation.principalComponent,      // How much reduced principal
    allocation.interestComponent,       // How much was interest
    allocation.remainingBalance         // New balance
  ]
);

Step 4: Update Loan Record

db.query(
  `UPDATE loan_customer SET
    remaining_balance = ?,
    next_payment_due = ?
   WHERE id = ?`,
  [allocation.remainingBalance, nextDue, loanId]
);

